version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: workspace_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: workspace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: workspace_redis
    ports:
      - "6379:6379"

  api:
    build: ./apps/api
    container_name: api
    environment:
      DATABASE_URL: postgres://user:pass@postgres:5432/workspace
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    command: npm run start:dev

  web:
    build: ./apps/web
    container_name: web
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
    command: npm run dev

volumes:
  pgdata: